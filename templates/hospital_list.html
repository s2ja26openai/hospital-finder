{% extends "base.html" %}
{% block title %}병원 목록 — 내 주변 병원 찾기{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/hospital_list.css">
{% endblock %}

{% block content %}
<div class="list-layout">
  <!-- 목록 패널 -->
  <div class="list-panel">
    <div class="list-header">
      <!-- 위치 바 -->
      <div class="location-bar" onclick="showLocationModal()" style="margin-bottom:10px;">
        <span class="location-bar-icon">📍</span>
        <span class="location-bar-text" id="locationBarText">위치 설정 중...</span>
        <span class="location-bar-change">변경</span>
      </div>

      <!-- 반경 필터 -->
      <div class="filter-row">
        <span class="filter-label">반경</span>
        <button class="radius-btn active" data-radius="500" onclick="setRadius(this)" aria-label="반경 500미터">500m</button>
        <button class="radius-btn" data-radius="1000" onclick="setRadius(this)" aria-label="반경 1킬로미터">1km</button>
        <button class="radius-btn" data-radius="5000" onclick="setRadius(this)" aria-label="반경 5킬로미터">5km</button>
        <button class="radius-btn" data-radius="10000" onclick="setRadius(this)" aria-label="반경 10킬로미터">10km</button>

        <!-- 정렬 -->
        <div class="sort-toggle" role="group" aria-label="정렬 기준">
          <button class="sort-btn active" data-sort="score" onclick="setSort(this)" aria-label="평점순 정렬">평점순</button>
          <button class="sort-btn" data-sort="distance" onclick="setSort(this)" aria-label="거리순 정렬">거리순</button>
        </div>
      </div>

      <div id="listSummary" style="font-size:13px;color:var(--color-text-sub);"></div>
    </div>

    <div id="hospitalList" role="list" aria-label="병원 목록"></div>
  </div>

  <!-- 지도 패널 -->
  <div class="map-panel">
    <div id="kakaoMap"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const SELECTED_DEPARTMENT = "{{ department or '' }}";
  const KAKAO_JS_API_KEY = "{{ kakao_js_api_key }}";
</script>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_js_api_key }}&autoload=false"></script>
<script src="/static/js/mock_data.js"></script>
<script src="/static/js/location.js"></script>
<script src="/static/js/hospital_list.js?v=2"></script>
{% endblock %}
