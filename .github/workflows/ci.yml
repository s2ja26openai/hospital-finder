name: CI

on:
  push:
    branches: [main, sprint3]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          KAKAO_JS_API_KEY: ""
          KAKAO_MAP_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: pytest --tb=short -v
